version: "3.9"

services:

  # ── PostgreSQL Database ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sms_db
      POSTGRES_USER: sms_user
      POSTGRES_PASSWORD: sms_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sms_user -d sms_db" ]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── FastAPI Backend ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sms_user:sms_pass@db:5432/sms_db
      SECRET_KEY: kdu-sms-secret-key-change-in-production-2025
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80,http://localhost"
    ports:
      - "8000:8000"

  # ── React Frontend (Nginx) ─────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: sms_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
